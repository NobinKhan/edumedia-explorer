{% extends "base.html" %}

{% block title %}{{ page.title }} — EduMedia Author{% endblock %}

{% block content %}
  <article class="article" aria-labelledby="page-title">
    <header class="page-header">
      <h1 class="page-title" id="page-title">{{ page.title }}</h1>
      {% if page.summary %}
        <p class="page-subtitle">{{ page.summary }}</p>
      {% endif %}
    </header>
    <div class="article__body">{{ page.rendered_content | safe }}</div>
  </article>

  <script id="edumedia-annotations" type="application/json">{{ annotations_json | safe }}</script>
  {% include "partials/modal.html" %}
{% endblock %}
