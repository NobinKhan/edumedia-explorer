<div class="modal" data-modal-root hidden>
  <div class="modal__overlay" data-modal-overlay></div>
  <div
    class="modal__dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title"
    aria-describedby="modal-desc"
    tabindex="-1"
    data-modal-dialog
  >
    <div class="modal__header">
      <div class="modal__titles">
        <div class="modal__title" id="modal-title" data-modal-title></div>
        <div class="modal__desc" id="modal-desc" data-modal-description></div>
      </div>
      <button class="icon-btn" type="button" aria-label="Close dialog" data-modal-close>
        ✕
      </button>
    </div>
    <div class="modal__body" data-modal-body></div>
    <div class="modal__footer" data-modal-footer hidden></div>
  </div>
</div>
